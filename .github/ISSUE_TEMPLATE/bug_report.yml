name: Bug Report
description: Report a bug in the lilbee Obsidian plugin
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open the lilbee chat
        2. Ask "..."
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error messages or notices.
    validations:
      required: true

  - type: dropdown
    id: server_mode
    attributes:
      label: Server Mode
      description: How is the plugin reaching the lilbee server?
      options:
        - Managed (plugin downloads and runs the server)
        - External (I run `lilbee serve` myself)
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g., macOS 14.2, Windows 11, Ubuntu 22.04"
    validations:
      required: true

  - type: input
    id: obsidian_version
    attributes:
      label: Obsidian Version
      placeholder: "e.g., 1.7.7"
    validations:
      required: true

  - type: input
    id: plugin_version
    attributes:
      label: lilbee Plugin Version
      placeholder: "e.g., 0.6.67"
    validations:
      required: true

  - type: input
    id: server_version
    attributes:
      label: lilbee Server Version
      description: Shown in the plugin status view. Leave blank if unknown.
      placeholder: "e.g., 0.3.9"
    validations:
      required: false

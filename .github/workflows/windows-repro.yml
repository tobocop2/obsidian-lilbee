name: Windows repro (#169)
on:
  workflow_dispatch:
  push:
    branches: ["experiment/windows-repro"]

jobs:
  repro:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run build

      - name: Install Obsidian
        shell: pwsh
        run: |
          $ver = "1.12.7"
          $url = "https://github.com/obsidianmd/obsidian-releases/releases/download/v$ver/Obsidian-$ver.exe"
          $inst = Join-Path $env:RUNNER_TEMP "ObsidianSetup.exe"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile $inst
          # electron-builder one-click installer, run as the runner user (not elevated),
          # so it lands in this user's %LOCALAPPDATA%\Programs\Obsidian.
          Start-Process -Wait -FilePath $inst -ArgumentList "/S"
          Start-Sleep -Seconds 5
          $candidates = @(
            (Join-Path $env:LOCALAPPDATA "Programs\Obsidian\Obsidian.exe"),
            (Join-Path $env:LOCALAPPDATA "Obsidian\Obsidian.exe")
          )
          $exe = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $exe) {
            $found = Get-ChildItem -Path "$env:LOCALAPPDATA\Programs" -Filter Obsidian.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $exe = $found.FullName }
          }
          if (-not $exe) { throw "Obsidian.exe not found after install" }
          "OBSIDIAN_EXE=$exe" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Obsidian: $exe"

      - name: Seed vault + plugin + Obsidian config
        shell: pwsh
        run: |
          $vault = Join-Path $env:RUNNER_TEMP "vault"
          $pdir  = Join-Path $vault ".obsidian\plugins\lilbee"
          New-Item -ItemType Directory -Force -Path $pdir | Out-Null
          Copy-Item main.js,manifest.json,styles.css $pdir
          '["lilbee"]' | Set-Content (Join-Path $vault ".obsidian\community-plugins.json")
          # managed mode + auto-open, to reproduce the reporter's real flow (managed setup -> chat opens)
          $data = @{ serverMode="managed"; setupCompleted=$true; autoOpenCockpit=$true; sharedRoot="" } | ConvertTo-Json
          $data | Set-Content (Join-Path $pdir "data.json")
          # register the vault as the open one
          $cfgDir = Join-Path $env:APPDATA "obsidian"
          New-Item -ItemType Directory -Force -Path $cfgDir | Out-Null
          $vaultJson = ($vault -replace '\\','\\')
          $obs = '{"vaults":{"aaaaaaaaaaaaaaaa":{"path":"' + $vaultJson + '","ts":1700000000000,"open":true}}}'
          $obs | Set-Content (Join-Path $cfgDir "obsidian.json")
          "VAULT=$vault" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "obsidian.json:"; Get-Content (Join-Path $cfgDir "obsidian.json")

      - name: Launch Obsidian + observe the real boot flow via CDP
        shell: pwsh
        run: |
          function Wait-Cdp {
            for ($i=0; $i -lt 40; $i++) {
              Start-Sleep -Seconds 3
              try {
                $t = Invoke-RestMethod -Uri "http://127.0.0.1:9222/json" -TimeoutSec 3
                if ($t | Where-Object { $_.type -eq "page" -and $_.url -like "*obsidian.md*" }) { return $true }
              } catch { }
            }
            return $false
          }
          $a = @("--remote-debugging-port=9222","--remote-allow-origins=*")
          Write-Host "Launching $env:OBSIDIAN_EXE"
          Start-Process -FilePath $env:OBSIDIAN_EXE -ArgumentList $a
          if (-not (Wait-Cdp)) { throw "CDP never appeared (initial)" }
          Write-Host "CDP up. Enabling community plugins + reloading so lilbee loads at boot..."
          node scripts/win-repro/drive.mjs scripts/win-repro/bootstrap.js 2>&1 | Write-Host
          Start-Sleep -Seconds 6
          if (-not (Wait-Cdp)) { throw "CDP never reappeared after reload" }
          # Managed mode downloads + starts the server; give it time, then observe.
          $result = $null
          for ($i=0; $i -lt 25; $i++) {
            Start-Sleep -Seconds 5
            $raw = (node scripts/win-repro/drive.mjs scripts/win-repro/observe.js 2>&1 | Out-String)
            $line = ($raw -split "`n") | Select-String "RESULT_JSON:" | Select-Object -First 1
            if ($line) {
              $json = ($line.ToString() -replace ".*RESULT_JSON:","")
              $obj = $json | ConvertFrom-Json
              Write-Host "attempt $i pluginLoaded=$($obj.pluginLoaded) samples=$($obj.samples -join ',')"
              if ($obj.pluginLoaded) { $result = $obj; break }
            } else {
              Write-Host "attempt $i (no result): $raw"
            }
          }
          if (-not $result) { throw "plugin never loaded" }
          Write-Host "=================== WINDOWS OBSERVE RESULT ==================="
          $result | ConvertTo-Json -Depth 6
          Write-Host "============================================================="


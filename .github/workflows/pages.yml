name: Pages

# Marketing site at https://tobocop2.github.io/obsidian-lilbee/ deployed
# from the site/ directory on main. Coverage report deploys alongside it
# under /coverage/. Demo GIFs live on the gh-pages asset branch and are
# referenced by raw.githubusercontent.com URLs from the site, so they
# don't need to be vendored here.

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Stage site
        run: |
          mkdir -p _site
          cp -R site/* _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
